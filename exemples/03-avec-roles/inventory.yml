# Inventaire pour l'exemple avec rôles
all: # Groupe racine contenant tous les serveurs
  vars: # Variables communes à tous les serveurs
    ansible_connection: docker # Type de connexion : Docker (pour le lab)
    ansible_user: root # Utilisateur pour se connecter aux conteneurs
    #ansible_python_interpreter: /usr/bin/python3 # Chemin de l'interpréteur Python sur les hôtes cibles

  children: # Sous-groupes d'hôtes
    webservers: # Groupe des serveurs web
      hosts: # Liste des serveurs du groupe webservers
        web01: # Premier serveur web
          ansible_host: ansible-lab-web01 # Nom du conteneur Docker
        web02: # Deuxième serveur web
          ansible_host: ansible-lab-web02 # Nom du conteneur Docker
        web03: # Troisième serveur web
          ansible_host: ansible-lab-web03 # Nom du conteneur Docker
