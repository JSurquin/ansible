--- # Début du document YAML
# Handlers du rôle nginx
# NOTE : Dans un environnement Docker sans systemd, on utilise des commandes directes
# En production avec systemd, utilisez plutôt le module 'service'

- name: Recharger Nginx # Nom du handler (appelé via notify)
  # Recharger la config à chaud avec nginx -s reload
  shell: nginx -t && nginx -s reload || true
  args:
    executable: /bin/bash

- name: Redémarrer Nginx # Nom du handler pour redémarrage complet
  # Redémarrer complètement nginx
  shell: pkill nginx || true && /usr/sbin/nginx
  args:
    executable: /bin/bash

- name: Vérifier la configuration Nginx # Nom du handler de validation
  command: nginx -t # Commande de test de la configuration Nginx
  register: nginx_test # Sauvegarder le résultat dans une variable
  changed_when: false # Ne pas marquer comme "changed" car c'est juste un test
  failed_when: nginx_test.rc != 0 # Échec si le code retour n'est pas 0
