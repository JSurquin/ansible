---
# Playbook avec variables et templates
# NOTE SUR L'ENVIRONNEMENT DOCKER :
# Ce playbook est adapté pour fonctionner dans des conteneurs Docker qui n'ont pas systemd.
# Dans un environnement de production (VMs, serveurs physiques), on utiliserait normalement :
#   - Le module 'service' au lieu de commandes shell directes
#   - systemctl start/restart nginx au lieu de /usr/sbin/nginx
# Mais pour un lab de formation avec Docker, on doit utiliser les commandes nginx natives.

- name: Déploiement avec configuration personnalisée
  hosts: webservers
  become: true
  
  tasks:
    # Tâche 1 : Installer Nginx
    - name: Installer Nginx
      apt:
        name: nginx
        state: present
        update_cache: yes
    
    # Tâche 2 : Créer le répertoire web
    - name: Créer le répertoire web
      file:
        path: /var/www/html
        state: directory
        owner: www-data
        group: www-data
        mode: '0755'
    
    # Tâche 3 : Générer la configuration Nginx depuis le template
    - name: Configurer Nginx avec template
      template:
        src: templates/nginx.conf.j2
        dest: /etc/nginx/nginx.conf
        owner: root
        group: root
        mode: '0644'
        backup: yes  # Sauvegarde de l'ancien fichier
      notify: Redémarrer Nginx
    
    # Tâche 4 : Générer la page HTML personnalisée
    - name: Déployer la page HTML personnalisée
      template:
        src: templates/index.html.j2
        dest: /var/www/html/index.html
        owner: www-data
        group: www-data
        mode: '0644'
    
    # Tâche 5 : S'assurer que Nginx est démarré
    # IMPORTANT : Dans un environnement Docker, on n'utilise PAS systemd/service car :
    # - Les conteneurs Docker sont minimalistes et n'ont pas systemd installé
    # - systemd nécessite des privilèges spéciaux (--privileged) et des volumes montés
    # - Les scripts init (/etc/init.d/) ne fonctionnent pas correctement dans les conteneurs
    # - Pour un lab de formation, on utilise donc des commandes directes nginx
    # Note : En production sur des VMs/serveurs physiques, on utiliserait normalement le module 'service'
    
    - name: Vérifier la configuration Nginx
      command: nginx -t
      register: nginx_test
      changed_when: false
      failed_when: nginx_test.rc != 0
    
    - name: Démarrer Nginx
      shell: |
        # Arrêter nginx s'il est déjà en cours d'exécution
        pkill nginx || true
        # Démarrer nginx directement (pas via systemd/init)
        /usr/sbin/nginx
      args:
        executable: /bin/bash
      register: nginx_start
      changed_when: true
    
    # Tâche 6 : Afficher les informations
    - name: Afficher les informations de déploiement
      debug:
        msg: |
          ✅ Déploiement terminé pour {{ inventory_hostname }}
          🌐 Application: {{ app_name }} v{{ app_version }}
          🏷️ Environnement: {{ app_environment }}
          🔗 URL: http://{{ ansible_host }}:{{ nginx_config.port }}
  
  # Handlers : Actions déclenchées par notify
  # Même raison que pour le démarrage : pas de systemd dans les conteneurs Docker
  # On utilise les commandes natives de nginx :
  # - 'nginx -s reload' pour recharger la config à chaud (si nginx tourne)
  # - Sinon on redémarre complètement nginx (après test de la config)
  handlers:
    - name: Redémarrer Nginx
      shell: nginx -t && nginx -s reload || (pkill nginx && /usr/sbin/nginx)
      args:
        executable: /bin/bash
