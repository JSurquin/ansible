---
# Handlers du rôle app

- name: Redémarrer l'application
  # NOTE : Pour Docker sans systemd
  # En production avec systemd, utilisez : service: name=myapp state=restarted
  shell: |
    pkill -f "python3 {{ app_dir }}/app.py" || true
    sleep 1
    nohup python3 {{ app_dir }}/app.py > {{ app_dir }}/app.log 2>&1 &
  become_user: "{{ app_user }}"
