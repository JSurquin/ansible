---
# Playbook de déploiement application uniquement

- name: Déploiement application
  hosts: appservers
  
  pre_tasks:
    - name: Vérifier la version à déployer
      assert:
        that:
          - app_version is defined
          - app_version != ""
        fail_msg: "La version de l'application doit être définie"
    
    - name: Afficher les informations de déploiement
      debug:
        msg: |
          🚀 Déploiement de {{ app_name }}
          🏷️ Version: {{ app_version }}
          🌍 Environnement: {{ app_environment }}
          📍 Serveurs: {{ ansible_play_hosts | join(', ') }}
  
  roles:
    - role: app
  
  post_tasks:
    - name: Vérifier que l'application répond
      uri:
        url: "http://localhost:{{ app_port }}/health"
        status_code: 200
      register: health_check
      retries: 5
      delay: 3
    
    - name: Confirmer le déploiement
      debug:
        msg: "✅ Application déployée et fonctionnelle sur {{ inventory_hostname }}"
