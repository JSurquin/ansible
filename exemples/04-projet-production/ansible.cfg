[defaults] {# Section : paramètres par défaut d'Ansible #}
# Configuration Ansible pour le projet

# Inventaire par défaut
inventory = inventories/staging {# Chemin vers l'inventaire staging par défaut #}

# Rôles
roles_path = ./roles:~/.ansible/roles {# Chemins de recherche des rôles (local puis global) #}

# Ne pas vérifier les clés SSH (pour lab uniquement, à éviter en prod réelle)
host_key_checking = False {# Désactiver vérification clés SSH (pour environnement lab) #}

# Afficher les temps d'exécution
callback_whitelist = timer, profile_tasks {# Plugins de callback pour mesures de performance #}

# Format de sortie
stdout_callback = default {# Plugin d'affichage de la sortie standard #}
result_format = yaml {# Format des résultats : YAML (lisible) #}

# Parallélisme
forks = 10 {# Nombre de processus parallèles pour exécution simultanée #}

# Timeout
timeout = 30 {# Délai d'expiration des connexions en secondes #}

# Retry
retry_files_enabled = True {# Activer création fichiers de retry en cas d'échec #}
retry_files_save_path = ~/.ansible-retry {# Répertoire de sauvegarde des fichiers retry #}

# Logs
log_path = ./ansible.log {# Chemin du fichier de logs Ansible #}

[privilege_escalation] {# Section : élévation de privilèges #}
become = True {# Activer l'élévation de privilèges par défaut #}
become_method = sudo {# Méthode d'élévation : sudo #}
become_user = root {# Utilisateur cible pour l'élévation : root #}
become_ask_pass = False {# Ne pas demander le mot de passe sudo #}

[ssh_connection] {# Section : configuration des connexions SSH #}
# Optimisations SSH
pipelining = True {# Activer pipelining SSH (réduction du nombre de connexions) #}
ssh_args = -o ControlMaster=auto -o ControlPersist=60s {# Arguments SSH pour multiplexing #}
