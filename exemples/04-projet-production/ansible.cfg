[defaults]
# Configuration Ansible pour le projet

# Inventaire par défaut
inventory = inventories/staging

# Rôles
roles_path = ./roles:~/.ansible/roles

# Ne pas vérifier les clés SSH (pour lab uniquement, à éviter en prod réelle)
host_key_checking = False

# Afficher les temps d'exécution
callback_whitelist = timer, profile_tasks

# Format de sortie
stdout_callback = default
result_format = yaml

# Parallélisme
forks = 10

# Timeout
timeout = 30

# Retry
retry_files_enabled = True
retry_files_save_path = ~/.ansible-retry

# Logs
log_path = ./ansible.log

[privilege_escalation]
become = True
become_method = sudo
become_user = root
become_ask_pass = False

[ssh_connection]
# Optimisations SSH
pipelining = True
ssh_args = -o ControlMaster=auto -o ControlPersist=60s
