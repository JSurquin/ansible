# Section : paramètres par défaut d'Ansible
[defaults]
# Configuration Ansible pour le projet

# Chemin vers l'inventaire staging par défaut
inventory = inventories/staging

# Chemins de recherche des rôles (local puis global)
roles_path = ./roles:~/.ansible/roles

# Désactiver vérification clés SSH (pour environnement lab uniquement)
# À éviter en production réelle pour des raisons de sécurité
host_key_checking = False

# Plugins de callback pour mesures de performance
# Affiche les temps d'exécution de chaque tâche
callback_whitelist = timer, profile_tasks

# Plugin d'affichage de la sortie standard
stdout_callback = default
# Format des résultats : YAML (lisible)
result_format = yaml

# Nombre de processus parallèles pour exécution simultanée
forks = 10

# Délai d'expiration des connexions en secondes
timeout = 30

# Activer création fichiers de retry en cas d'échec
retry_files_enabled = True
# Répertoire de sauvegarde des fichiers retry
retry_files_save_path = ~/.ansible-retry

# Chemin du fichier de logs Ansible
log_path = ./ansible.log

# Section : élévation de privilèges
[privilege_escalation]
# Activer l'élévation de privilèges par défaut
become = True
# Méthode d'élévation : sudo
become_method = sudo
# Utilisateur cible pour l'élévation : root
become_user = root
# Ne pas demander le mot de passe sudo
become_ask_pass = False

# Section : configuration des connexions SSH
[ssh_connection]
# Activer pipelining SSH (réduction du nombre de connexions)
pipelining = True
# Arguments SSH pour multiplexing (ControlMaster pour réutiliser les connexions)
ssh_args = -o ControlMaster=auto -o ControlPersist=60s
