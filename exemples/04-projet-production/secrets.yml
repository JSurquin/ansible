---
# Fichier de secrets (à chiffrer avec ansible-vault)
# Pour chiffrer: ansible-vault encrypt secrets.yml
# Pour éditer: ansible-vault edit secrets.yml

# Passwords base de données
vault_db_password_staging: "staging_secret_password_123"
vault_db_password_production: "prod_very_secret_password_456"

# API Keys
vault_api_key: "sk-1234567890abcdef"
vault_monitoring_token: "mon-token-secret"

# Certificats SSL (en production, utiliser des vrais certificats)
vault_ssl_cert_password: "cert_password_789"

# Autres secrets
vault_jwt_secret: "super_secret_jwt_key"
vault_encryption_key: "encryption_key_for_data"
