--- # Début du document YAML
# Fichier de secrets (à chiffrer avec ansible-vault)
# Pour chiffrer: ansible-vault encrypt secrets.yml {# Commande pour chiffrer ce fichier #}
# Pour éditer: ansible-vault edit secrets.yml {# Commande pour éditer le fichier chiffré #}

# Passwords base de données
vault_db_password_staging: "staging_secret_password_123" # Mot de passe BDD staging (à chiffrer)
vault_db_password_production: "prod_very_secret_password_456" # Mot de passe BDD production (à chiffrer)

# API Keys
vault_api_key: "sk-1234567890abcdef" # Clé API pour services externes (à chiffrer)
vault_monitoring_token: "mon-token-secret" # Token pour accès au monitoring (à chiffrer)

# Certificats SSL (en production, utiliser des vrais certificats)
vault_ssl_cert_password: "cert_password_789" # Mot de passe du certificat SSL (à chiffrer)

# Autres secrets
vault_jwt_secret: "super_secret_jwt_key" # Clé secrète pour signature JWT (à chiffrer)
vault_encryption_key: "encryption_key_for_data" # Clé de chiffrement des données (à chiffrer)
