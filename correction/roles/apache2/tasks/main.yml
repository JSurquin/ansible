---
- name: Mettre à jour le cache APT
  apt:
    update_cache: yes
    cache_valid_time: 3600

- name: Installer Apache2
  apt:
    name: "{{ apache_package }}"
    state: present

- name: Créer le répertoire du site web
  file:
    path: "{{ apache_document_root }}"
    state: directory
    mode: '0755'

- name: Déployer la configuration Apache2
  template:
    src: apache2.conf.j2
    dest: "{{ apache_config_path }}"
    mode: '0644'
  notify: restart apache2

- name: Déployer la page d'accueil
  template:
    src: index.html.j2
    dest: "{{ apache_document_root }}/index.html"
    mode: '0644'

- name: S'assurer qu'Apache2 est démarré et activé
  service:
    name: "{{ apache_service }}"
    state: started
    enabled: yes
